apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: oficina
resources:
  - ../../base
  - externalsecret.yaml
patchesStrategicMerge:
  - app-deployment-patch.yaml
  - configmap-patch.yaml
  - hpa-patch.yaml
  - postgres-deployment-delete.yaml
  - postgres-pvc-delete.yaml
  - postgres-service-delete.yaml
  - secret-delete.yaml
images:
  - name: oficina
    newName: ghcr.io/gabriel-ivo/oficina
    newTag: hml

