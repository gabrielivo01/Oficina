apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-postgres
  namespace: oficina
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oficina-postgres
  template:
    metadata:
      labels:
        app: oficina-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: oficina_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oficina-secret
                  key: SPRING_DATASOURCE_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: oficina-postgres-pvc