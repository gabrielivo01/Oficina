name: Plan Infra and K8s

on:
  workflow_dispatch:
    inputs:
      overlay:
        description: "Target overlay"
        required: true
        type: choice
        options:
          - hml
          - prod
      terraform_env_dir:
        description: "Terraform environment directory"
        required: true
        default: "infra/terraform/environments/dev"

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      USE_EXTERNAL_SECRETS: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Run unit tests
        run: ./mvnw -q test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Terraform init
        run: terraform -chdir=${{ github.event.inputs.terraform_env_dir }} init -input=false

      - name: Terraform format check
        run: terraform -chdir=${{ github.event.inputs.terraform_env_dir }} fmt -check

      - name: Terraform validate
        run: terraform -chdir=${{ github.event.inputs.terraform_env_dir }} validate

      - name: Run tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ github.event.inputs.terraform_env_dir }}

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ github.event.inputs.terraform_env_dir }}
          quiet: true

      - name: Terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform -chdir=${{ github.event.inputs.terraform_env_dir }} plan -input=false -out=tfplan

      - name: Export Terraform plan (text)
        run: terraform -chdir=${{ github.event.inputs.terraform_env_dir }} show -no-color tfplan > tfplan.txt

      - name: Render target overlay
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          OUTPUT_DIR: ${{ github.workspace }}/rendered-overlay
        run: |
          chmod +x scripts/*.sh
          scripts/render_k8s_overlay.sh "${{ github.event.inputs.overlay }}" "${{ github.event.inputs.terraform_env_dir }}"

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.inputs.overlay }}
          path: |
            ${{ github.event.inputs.terraform_env_dir }}/tfplan
            ${{ github.event.inputs.terraform_env_dir }}/tfplan.txt

      - name: Upload rendered overlay artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-overlay-${{ github.event.inputs.overlay }}
          path: ${{ github.workspace }}/rendered-overlay
